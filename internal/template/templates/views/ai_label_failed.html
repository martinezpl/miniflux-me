{{ define "title"}}Labeling Failed{{ end }}

{{ define "page_header"}}
<section class="page-header">
    <h1>AI Labeling Failed</h1>
    {{ if .entries }}
    <nav>
        <ul>
            <li>
                <form method="post" action="{{ routePath "/entries/labeling-failed/retry" }}">
                    <input type="hidden" name="csrf" value="{{ .csrf }}">
                    <button type="submit" class="page-button">Retry All ({{ len .entries }})</button>
                </form>
            </li>
        </ul>
    </nav>
    {{ end }}
</section>
{{ end }}

{{ define "content"}}
{{ if not .entries }}
    <p class="alert">No labeling failures.</p>
{{ else }}
    <div class="items">
        {{ range .entries }}
        <article class="item entry-item item-status-{{ .Status }}">
            <header class="item-header" dir="auto">
                <h2 class="item-title">
                    <a href="{{ .URL }}" target="_blank" rel="noopener noreferrer">{{ .Title }}</a>
                </h2>
                <span class="category">{{ .Feed.Title }}</span>
            </header>
        </article>
        {{ end }}
    </div>
{{ end }}
{{ end }}
